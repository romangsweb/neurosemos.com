<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="8" fill="#1a1a24"/>
  <!-- Notebook shape -->
  <rect x="100" y="40" width="200" height="220" rx="6" fill="#2d1b4e" stroke="#d4a0b9" stroke-width="1.5" stroke-opacity="0.3"/>
  <rect x="110" y="50" width="180" height="200" rx="4" fill="#111118"/>
  <!-- Spiral binding -->
  <circle cx="105" cy="70" r="4" fill="none" stroke="#d4a0b9" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="105" cy="100" r="4" fill="none" stroke="#d4a0b9" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="105" cy="130" r="4" fill="none" stroke="#d4a0b9" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="105" cy="160" r="4" fill="none" stroke="#d4a0b9" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="105" cy="190" r="4" fill="none" stroke="#d4a0b9" stroke-width="1" stroke-opacity="0.4"/>
  <circle cx="105" cy="220" r="4" fill="none" stroke="#d4a0b9" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Lines -->
  <line x1="130" y1="80" x2="270" y2="80" stroke="#3e3e50" stroke-width="0.5"/>
  <line x1="130" y1="100" x2="270" y2="100" stroke="#3e3e50" stroke-width="0.5"/>
  <line x1="130" y1="120" x2="270" y2="120" stroke="#3e3e50" stroke-width="0.5"/>
  <line x1="130" y1="140" x2="270" y2="140" stroke="#3e3e50" stroke-width="0.5"/>
  <line x1="130" y1="160" x2="270" y2="160" stroke="#3e3e50" stroke-width="0.5"/>
  <line x1="130" y1="180" x2="270" y2="180" stroke="#3e3e50" stroke-width="0.5"/>
  <line x1="130" y1="200" x2="270" y2="200" stroke="#3e3e50" stroke-width="0.5"/>
  <!-- Title text -->
  <text x="200" y="70" text-anchor="middle" fill="#d4a0b9" font-family="Georgia" font-size="14" font-weight="bold">Mindfulness</text>
  <!-- Lotus icon -->
  <path d="M200 210 Q190 195 200 185 Q210 195 200 210Z" fill="#7c4dbd" opacity="0.6"/>
  <path d="M200 210 Q185 200 190 185 Q200 195 200 210Z" fill="#7c4dbd" opacity="0.4"/>
  <path d="M200 210 Q215 200 210 185 Q200 195 200 210Z" fill="#7c4dbd" opacity="0.4"/>
